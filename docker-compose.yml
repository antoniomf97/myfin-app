services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app   # hot reload
      - db_data:/app/data        # named volume — cleared by docker compose down -v

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src  # hot reload
      - /app/node_modules        # keep container's Linux node_modules
    depends_on:
      - backend

volumes:
  db_data:
